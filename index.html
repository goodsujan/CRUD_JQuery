<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Expense Tracker</title>
    <style>
          body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            margin: 0;
            padding: 20px;
          }
          .container {
            max-width: 900px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
          }
        </style>
      </head>
      <body>
        <div class="container">
          <h1>Expense Tracker</h1>
          <form id="expense-form">
            <script>
          $(function () {
            // Basic CRUD logic using jQuery (in-memory)
            $("#expense-form").on("submit", function (e) {
              e.preventDefault();
              const date = $("#date").val();
              const title = $("#title").val();
              const amount = parseFloat($("#amount").val()).toFixed(2);
              const row = $("<tr>")
                .append($("<td>").text(date))
                .append($("<td>").text(title))
                .append($("<td>").text(amount))
                .append(
                  $("<td>").html('<button class="edit">Edit</button> <button class="delete">Delete</button>'),
                );
              $("#expenses-table tbody").append(row);
              this.reset();
            });

            $("#expenses-table").on("click", ".delete", function () {
              $(this).closest("tr").remove();
            });

            // Edit handler: populate inputs and remove the row
            $("#expenses-table").on("click", ".edit", function () {
              const tr = $(this).closest("tr");
              const date = tr.find("td").eq(0).text();
              const title = tr.find("td").eq(1).text();
              const amount = tr.find("td").eq(2).text();
              $("#date").val(date);
              $("#title").val(title);
              $("#amount").val(amount);
              tr.remove();
            });
          });
        </script>
          <input type="date" id="date" required />
          <input type="text" id="title" placeholder="Title" required />
          <input
            type="number"
            id="amount"
            placeholder="Amount"
            step="0.01"
            required
          />
          <button type="submit" id="add-expense">Add Expense</button>
        </div>
      </form>

      <table id="expenses-table">
        <thead>
          <tr>
            <th>Date</th>
            <th>Title</th>
            <th>Amount</th>
            <th class="actions">Actions</th>
          </tr>
        </thead>
        <tbody>
          <!-- Expenses will be rendered here -->
        </tbody>
      </table>
    </div>

    <!-- jQuery CDN -->
    <script
      src="https://code.jquery.com/jquery-3.6.0.min.js"
      integrity="sha256-/xUj+3OJ+Y5m6Q6v3bZ8T2n5l9H7b4x3Y9x3qv9Z7a8="
      crossorigin="anonymous"
    ></script>

    <script>
      $(function () {
        // Placeholder for future CRUD logic using jQuery
        $("#expense-form").on("submit", function (e) {
          e.preventDefault();
          const desc = $("#desc").val();
          const amount = parseFloat($("#amount").val()).toFixed(2);
          const date = $("#date").val();
          const row = $("<tr>")
            .append($("<td>").text(desc))
            .append($("<td>").text(amount))
            .append($("<td>").text(date))
            .append(
              $("<td>").html(
                '<button class="edit">Edit</button> <button class="delete">Delete</button>',
              ),
            );
          $("#expenses-table tbody").append(row);
          this.reset();
        });

        $("#expenses-table").on("click", ".delete", function () {
          $(this).closest("tr").remove();
        });

        // Edit handler placeholder
        $("#expenses-table").on("click", ".edit", function () {
          const tr = $(this).closest("tr");
          const desc = tr.find("td").eq(0).text();
          const amount = tr.find("td").eq(1).text();
          const date = tr.find("td").eq(2).text();
          $("#desc").val(desc);
          $("#amount").val(amount);
          $("#date").val(date);
          tr.remove();
        });
      });
    </script>
  </body>
</html>
