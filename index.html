<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="A simple expense tracker application for managing and tracking your daily expenses."
    />
    <meta
      name="keywords"
      content="expense tracker, budget, finance, money management"
    />
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- Main Container -->
    <div class="container">
      <h1 class="header-title">Expense Tracker</h1>

      <!-- Expense Input Form -->
      <form id="expense-form">
        <div class="row">
          <input type="date" id="date" required />
          <input type="text" id="title" placeholder="Title" required />
          <input
            type="number"
            id="amount"
            placeholder="Amount"
            step="0.01"
            required
          />
          <button type="submit" id="add-expense">Add Expense</button>
        </div>
      </form>

      <!-- Table Wrapper -->
      <div class="table-wrapper">
        <table id="expenses-table">
          <thead>
            <tr>
              <th>Date</th>
              <th>Title</th>
              <th>Amount</th>
              <th class="actions">Actions</th>
            </tr>
          </thead>
          <tbody>
            <!-- Expenses dynamically rendered here -->
          </tbody>
        </table>
      </div>

      <!-- Total Expenses Section -->
      <div class="total-section">
        <strong>Total Expenses:</strong> $<span id="total-amount">0.00</span>
      </div>

      <!-- Footer -->
      <footer class="footer">
        <p>© 2026 Expense Tracker. Sujan</p>
      </footer>
    </div>

    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <!-- Script -->
    <script>
      $(function () {
        let expenses = JSON.parse(localStorage.getItem("expenses")) || [];
        let editIndex = null;

        function saveExpenses() {
          localStorage.setItem("expenses", JSON.stringify(expenses));
        }

        function updateTotal() {
          const total = expenses.reduce((sum, exp) => sum + exp.amount, 0);
          $("#total-amount").text(total.toFixed(2));
        }

        function renderTable() {
          const tbody = $("#expenses-table tbody");
          tbody.empty();
          expenses.forEach((exp, idx) => {
            const tr = $("<tr>").attr("data-index", idx);
            tr.append(`<td>${exp.date}</td>`);
            tr.append(`<td>${exp.title}</td>`);
            tr.append(`<td>${exp.amount.toFixed(2)}</td>`);
            tr.append(`<td class="actions">
              <button class="edit">Edit</button>
              <button class="delete">Delete</button>
            </td>`);
            tbody.append(tr);
          });
          updateTotal();
        }

        function resetForm() {
          $("#expense-form")[0].reset();
          $("#add-expense").text("Add Expense");
          editIndex = null;
        }

        $("#expense-form").on("submit", function (e) {
          e.preventDefault();
          const date = $("#date").val();
          const title = $("#title").val().trim();
          const amount = parseFloat($("#amount").val());

          if (!date || !title || isNaN(amount)) {
            alert("Please fill date, title and a valid amount.");
            return;
          }

          const record = { date, title, amount };

          if (editIndex === null) {
            expenses.push(record);
          } else {
            expenses[editIndex] = record;
          }

          saveExpenses();
          renderTable();
          resetForm();
        });

        // Edit button
        $("#expenses-table").on("click", ".edit", function () {
          const idx = $(this).closest("tr").data("index");
          const exp = expenses[idx];
          $("#date").val(exp.date);
          $("#title").val(exp.title);
          $("#amount").val(exp.amount);
          $("#add-expense").text("Update Expense");
          editIndex = idx;
        });

        // Delete button
        $("#expenses-table").on("click", ".delete", function () {
          const idx = $(this).closest("tr").data("index");
          if (confirm("Are you sure you want to delete this expense?")) {
            expenses.splice(idx, 1);
            saveExpenses();
            renderTable();
            resetForm();
          }
        });

        // Initial render
        renderTable();
      });
    </script>
  </body>
</html>
