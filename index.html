<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="styles.css" />
      </head>
      <body>
        <div class="container">
          <h1>Expense Tracker</h1>
          <form id="expense-form">
          <input type="date" id="date" required />
          <input type="text" id="title" placeholder="Title" required />
          <input
            type="number"
            id="amount"
            placeholder="Amount"
            step="0.01"
            required
          />
          <button type="submit" id="add-expense">Add Expense</button>
        </div>
      </form>

      <table id="expenses-table">
        <thead>
          <tr>
            <th>Date</th>
            <th>Title</th>
            <th>Amount</th>
            <th class="actions">Actions</th>
          </tr>
        </thead>
        <tbody>
          <!-- Expenses will be rendered here -->
        </tbody>
      </table>

      <div class="total-section">
        <strong>Total Expenses:</strong> $<span id="total-amount">0.00</span>
      </div>
    </div>

    <!-- jQuery CDN -->
    <script
      src="https://code.jquery.com/jquery-3.6.0.min.js"
      integrity="sha256-/xUj+3OJ+Y5m6Q6v3bZ8T2n5l9H7b4x3Y9x3qv9Z7a8="
      crossorigin="anonymous"
    ></script>

    <script>
      $(function () {
        const STORAGE_KEY = 'expenses_v1';
        let expenses = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
        let editIndex = -1;

        function save() {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(expenses));
        }

        function renderTable() {
          const tbody = $('#expenses-table tbody').empty();
          expenses.forEach((exp, idx) => {
            const tr = $('<tr>').attr('data-index', idx)
              .append($('<td>').text(exp.date))
              .append($('<td>').text(exp.title))
              .append($('<td>').text(Number(exp.amount).toFixed(2)))
              .append($('<td>').addClass('actions').html('<button class="edit">Edit</button> <button class="delete">Delete</button>'));
            tbody.append(tr);
          });
        }

        function resetForm() {
          $('#expense-form')[0].reset();
          editIndex = -1;
          $('#add-expense').text('Add Expense');
        }

        function calculateTotal() {
          const total = expenses.reduce((sum, exp) => sum + Number(exp.amount), 0);
          $('#total-amount').text(total.toFixed(2));
        }

        $('#expense-form').on('submit', function (e) {
          e.preventDefault();
          const date = $('#date').val();
          const title = $('#title').val().trim();
          const amount = parseFloat($('#amount').val());

          // Validation checks
          if (!date) {
            return alert('Please select a date.');
          }
          if (!title) {
            return alert('Please enter a title.');
          }
          if (isNaN(amount)) {
            return alert('Please enter a valid amount.');
          }
          if (amount <= 0) {
            return alert('Amount must be greater than zero.');
          }

          const expense = { date, title, amount };
          if (editIndex >= 0) {
            expenses[editIndex] = expense;
          } else {
            expenses.push(expense);
          }
          save();
          renderTable();
          calculateTotal();
          resetForm();
        });

        $('#expenses-table').on('click', '.delete', function () {
          const idx = $(this).closest('tr').data('index');
          if (idx === undefined) return;
          expenses.splice(idx, 1);
          save();
          renderTable();
          calculateTotal();
        });

        $('#expenses-table').on('click', '.edit', function () {
          const idx = $(this).closest('tr').data('index');
          const exp = expenses[idx];
          if (!exp) return;
          $('#date').val(exp.date);
          $('#title').val(exp.title);
          $('#amount').val(exp.amount);
          editIndex = idx;
          $('#add-expense').text('Update Expense');
        });

        // initial render
        renderTable();
        calculateTotal();
      });
    </script>
  </body>
</html>
